const total = captions.length;

function getIndex() {
  let n = parseInt(localStorage.getItem("caption_index") || "0", 10);
  if (isNaN(n) || n < 0) n = 0;
  if (n >= total) n = total;
  return n;
}

function setIndex(n) {
  localStorage.setItem("caption_index", String(n));
  updatePreview();
}

function updatePreview() {
  const i = getIndex();
  const counter = document.getElementById("counter");
  const preview = document.getElementById("preview");
  if (i >= total) {
    counter.textContent = `已到最后：共 ${total} 条，当前没有下一条`;
    preview.value = "文案已经全部复制完。需要重新开始请点“重置到第 1 条”。";
  } else {
    counter.textContent = `下一条：第 ${i + 1} / ${total} 条`;
    preview.value = captions[i];
  }
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    const ta = document.getElementById("preview");
    ta.focus();
    ta.select();
    return document.execCommand("copy");
  }
}

async function copyNext() {
  const i = getIndex();
  if (i >= total) {
    alert("已经复制完全部文案。");
    updatePreview();
    return;
  }
  const ok = await copyText(captions[i]);
  if (ok) {
    setIndex(i + 1);
    alert(`已复制第 ${i + 1} 条，可以去粘贴了。`);
  } else {
    alert("复制失败，请长按文本框手动复制。");
  }
}

function resetIndex() {
  if (confirm("确定重置到第 1 条吗？")) {
    setIndex(0);
  }
}

function prevOne() {
  const i = getIndex();
  setIndex(Math.max(0, i - 1));
}

updatePreview();
