<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mark 小工具">
<title>Mark 小工具</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --text: #101114;
    --muted: #70737a;
    --line: #e1e3e8;
    --soft: #f0f1f3;
    --primary: #111111;
    --ok: #137a3f;
    --warn: #a12a20;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }

  button, input, textarea { font: inherit; }

  .page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: max(18px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
  }

  .view { display: none; }
  .view.is-active { display: block; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .backBtn {
    width: auto;
    min-height: 42px;
    padding: 10px 13px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
    font-size: 15px;
  }

  .topTitle {
    min-width: 0;
    font-size: 20px;
    font-weight: 900;
    line-height: 1.2;
  }

  .hero {
    padding: 22px 2px 12px;
  }

  .hero h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.18;
    letter-spacing: 0;
  }

  .hero p {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
  }

  .menuGrid {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .menuCard {
    width: 100%;
    min-height: 108px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    text-align: left;
    box-shadow: 0 8px 22px rgba(16,17,20,.05);
  }

  .menuCard strong {
    display: block;
    font-size: 21px;
    line-height: 1.25;
  }

  .menuCard span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
    font-weight: 500;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 8px 22px rgba(16,17,20,.05);
  }

  .sub {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 12px 0;
  }

  .stat {
    min-height: 66px;
    padding: 11px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.3;
  }

  .stat strong {
    display: block;
    margin-top: 6px;
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: 0;
  }

  .label {
    display: block;
    margin: 14px 0 7px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }

  textarea {
    width: 100%;
    min-height: 145px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 13px;
    background: #fff;
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    -webkit-appearance: none;
  }

  input {
    width: 100%;
    min-width: 0;
    height: 52px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0 12px;
    background: #fff;
    color: var(--text);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
  }

  button {
    width: 100%;
    min-height: 52px;
    border: none;
    border-radius: 8px;
    padding: 13px 15px;
    font-size: 16px;
    font-weight: 850;
    line-height: 1.25;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  button:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .primary { background: var(--primary); color: #fff; }
  .secondary { background: var(--soft); color: var(--text); }

  .note, .metaBox {
    min-height: 54px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .controls {
    display: grid;
    gap: 9px;
    margin-top: 13px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }

  .jumpBox {
    margin-top: 13px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }

  .jumpTitle {
    margin-bottom: 9px;
    font-size: 14px;
    font-weight: 850;
  }

  .jumpRow {
    display: grid;
    grid-template-columns: 1fr 94px;
    gap: 9px;
    align-items: stretch;
  }

  .status {
    min-height: 23px;
    margin-top: 12px;
    color: var(--ok);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.45;
  }

  .status.warn { color: var(--warn); }

  .tip {
    margin: 9px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .productToolbar {
    display: grid;
    gap: 9px;
    margin: 13px 0;
  }

  .productList {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .productItem {
    display: grid;
    grid-template-columns: 42px 1fr 86px;
    gap: 9px;
    align-items: center;
    min-height: 58px;
    padding: 9px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .productNo {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: #f0f1f3;
    color: var(--muted);
    font-size: 14px;
    font-weight: 850;
  }

  .productName {
    min-width: 0;
    color: var(--text);
    text-decoration: none;
    font-size: 16px;
    font-weight: 850;
    line-height: 1.35;
    overflow-wrap: anywhere;
  }

  .copyLinkBtn {
    min-height: 40px;
    padding: 9px 10px;
    font-size: 14px;
  }

  @media (max-width: 420px) {
    .page { padding-left: 12px; padding-right: 12px; }
    .stats, .row, .jumpRow { grid-template-columns: 1fr; }
    .productItem { grid-template-columns: 38px 1fr; }
    .copyLinkBtn { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
  <main class="page">
    <section id="homeView" class="view is-active">
      <div class="hero">
        <h1>Mark 小工具</h1>
        <p>选择当前任务。所有内容都从 Google 表格读取，刷新后自动拿最新数据。</p>
      </div>

      <div class="menuGrid">
        <button class="menuCard" type="button" data-open-view="dailyView">
          <strong>日常发布</strong>
          <span>复制日常文案，显示中文注释，不管使用时间。</span>
        </button>

        <button class="menuCard" type="button" data-open-view="cartCaptionView">
          <strong>挂车发布</strong>
          <span>显示商品名和中文注释，复制时只复制文案。</span>
        </button>

        <button class="menuCard" type="button" data-open-view="productView">
          <strong>挂车链接</strong>
          <span>点商品名打开商品页，也可以复制完整商品链接。</span>
        </button>
      </div>
    </section>

    <section id="dailyView" class="view">
      <div class="topbar">
        <button class="backBtn" type="button" data-open-view="homeView">返回</button>
        <div class="topTitle">日常发布</div>
      </div>
      <div class="card">
        <p class="sub">按顺序复制日常文案。中文注释只显示，不会复制。</p>
        <div class="stats" aria-live="polite">
          <div class="stat"><span>已读取文案</span><strong id="dailyTotal">0</strong></div>
          <div class="stat"><span>当前进度</span><strong id="dailyPosition">0 / 0</strong></div>
        </div>
        <label class="label" for="dailyPreview">当前文案</label>
        <textarea id="dailyPreview" readonly placeholder="正在读取表格数据..."></textarea>
        <span class="label">中文注释</span>
        <div class="note" id="dailyNote">正在读取表格数据...</div>
        <div class="controls">
          <button id="dailyCopyBtn" class="primary" type="button">复制下一条文案</button>
          <div class="row">
            <button id="dailyPrevBtn" class="secondary" type="button">上一条</button>
            <button id="dailyResetBtn" class="secondary" type="button">重置到第 1 条</button>
          </div>
          <button id="dailyRefreshBtn" class="secondary" type="button">刷新日常发布</button>
        </div>
        <div class="jumpBox">
          <div class="jumpTitle">跳转到指定编号</div>
          <div class="jumpRow">
            <input id="dailyJumpInput" type="number" inputmode="numeric" min="1" placeholder="输入编号">
            <button id="dailyJumpBtn" class="secondary" type="button">跳转</button>
          </div>
        </div>
        <div class="status" id="dailyStatus" role="status" aria-live="polite"></div>
      </div>
    </section>

    <section id="cartCaptionView" class="view">
      <div class="topbar">
        <button class="backBtn" type="button" data-open-view="homeView">返回</button>
        <div class="topTitle">挂车发布</div>
      </div>
      <div class="card">
        <p class="sub">挂车文案会显示商品名，但复制时只复制「可复制文案」。</p>
        <div class="stats" aria-live="polite">
          <div class="stat"><span>已读取文案</span><strong id="cartTotal">0</strong></div>
          <div class="stat"><span>当前进度</span><strong id="cartPosition">0 / 0</strong></div>
        </div>
        <span class="label">商品名</span>
        <div class="metaBox" id="cartProductName">正在读取表格数据...</div>
        <label class="label" for="cartPreview">当前文案</label>
        <textarea id="cartPreview" readonly placeholder="正在读取表格数据..."></textarea>
        <span class="label">中文注释</span>
        <div class="note" id="cartNote">正在读取表格数据...</div>
        <div class="controls">
          <button id="cartCopyBtn" class="primary" type="button">复制下一条文案</button>
          <div class="row">
            <button id="cartPrevBtn" class="secondary" type="button">上一条</button>
            <button id="cartResetBtn" class="secondary" type="button">重置到第 1 条</button>
          </div>
          <button id="cartRefreshBtn" class="secondary" type="button">刷新挂车发布</button>
        </div>
        <div class="jumpBox">
          <div class="jumpTitle">跳转到指定编号</div>
          <div class="jumpRow">
            <input id="cartJumpInput" type="number" inputmode="numeric" min="1" placeholder="输入编号">
            <button id="cartJumpBtn" class="secondary" type="button">跳转</button>
          </div>
        </div>
        <div class="status" id="cartStatus" role="status" aria-live="polite"></div>
      </div>
    </section>

    <section id="productView" class="view">
      <div class="topbar">
        <button class="backBtn" type="button" data-open-view="homeView">返回</button>
        <div class="topTitle">挂车链接</div>
      </div>
      <div class="card">
        <p class="sub">商品表只填「编号、商品名、PID」。网页会自动补全 TikTok 商品链接。</p>
        <div class="stats" aria-live="polite">
          <div class="stat"><span>已读取商品</span><strong id="productCount">0</strong></div>
          <div class="stat"><span>链接前缀</span><strong>自动</strong></div>
        </div>
        <div class="productToolbar">
          <input id="productSearch" type="search" placeholder="搜索商品名">
          <button id="productRefreshBtn" class="secondary" type="button">刷新挂车链接</button>
        </div>
        <div class="productList" id="productList"></div>
        <div class="status" id="productStatus" role="status" aria-live="polite"></div>
        <p class="tip">点商品名打开商品页；点「复制」复制完整商品链接。</p>
      </div>
    </section>
  </main>

<script>
const DAILY_CAPTION_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=2005332137&single=true&output=csv";
const CART_CAPTION_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=512170271&single=true&output=csv";
const PRODUCT_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=1889161542&single=true&output=csv";
const PRODUCT_URL_PREFIX = "https://shop.tiktok.com/view/product/";

const captionModules = {
  daily: { url: DAILY_CAPTION_CSV_URL, storageKey: "daily_caption_index_v2", items: [], index: 0, loading: false },
  cart: { url: CART_CAPTION_CSV_URL, storageKey: "cart_caption_index_v2", items: [], index: 0, loading: false }
};

let productItems = [];
let isProductLoading = false;
const els = {};

document.addEventListener("DOMContentLoaded", () => {
  cacheElements();
  bindEvents();
  initCaptionModule("daily");
  initCaptionModule("cart");
  loadCaptionSheet("daily", false);
  loadCaptionSheet("cart", false);
  loadProductSheet(false);
});

function cacheElements() {
  els.views = document.querySelectorAll(".view");
  cacheCaptionEls("daily");
  cacheCaptionEls("cart");
  els.productCount = document.getElementById("productCount");
  els.productSearch = document.getElementById("productSearch");
  els.productRefreshBtn = document.getElementById("productRefreshBtn");
  els.productList = document.getElementById("productList");
  els.productStatus = document.getElementById("productStatus");
}

function cacheCaptionEls(type) {
  const module = captionModules[type];
  module.els = {
    total: document.getElementById(type + "Total"),
    position: document.getElementById(type + "Position"),
    preview: document.getElementById(type + "Preview"),
    note: document.getElementById(type + "Note"),
    productName: document.getElementById(type + "ProductName"),
    copyBtn: document.getElementById(type + "CopyBtn"),
    prevBtn: document.getElementById(type + "PrevBtn"),
    resetBtn: document.getElementById(type + "ResetBtn"),
    refreshBtn: document.getElementById(type + "RefreshBtn"),
    jumpInput: document.getElementById(type + "JumpInput"),
    jumpBtn: document.getElementById(type + "JumpBtn"),
    status: document.getElementById(type + "Status")
  };
}

function bindEvents() {
  document.querySelectorAll("[data-open-view]").forEach((button) => {
    button.addEventListener("click", () => showView(button.dataset.openView));
  });

  bindCaptionEvents("daily");
  bindCaptionEvents("cart");
  els.productRefreshBtn.addEventListener("click", () => loadProductSheet(true));
  els.productSearch.addEventListener("input", renderProducts);
  els.productList.addEventListener("click", handleProductListClick);
}

function bindCaptionEvents(type) {
  const module = captionModules[type];
  module.els.copyBtn.addEventListener("click", () => copyNextCaption(type));
  module.els.prevBtn.addEventListener("click", () => prevCaption(type));
  module.els.resetBtn.addEventListener("click", () => resetCaptionIndex(type));
  module.els.refreshBtn.addEventListener("click", () => loadCaptionSheet(type, true));
  module.els.jumpBtn.addEventListener("click", () => jumpToCaption(type));
  module.els.jumpInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") jumpToCaption(type);
  });
}

function showView(viewId) {
  els.views.forEach((view) => view.classList.toggle("is-active", view.id === viewId));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function initCaptionModule(type) {
  const module = captionModules[type];
  const saved = parseInt(localStorage.getItem(module.storageKey) || "0", 10);
  module.index = Number.isFinite(saved) && saved >= 0 ? saved : 0;
}

function saveCaptionIndex(type) {
  const module = captionModules[type];
  localStorage.setItem(module.storageKey, String(module.index));
}

async function loadCaptionSheet(type, forceRefresh) {
  const module = captionModules[type];
  module.loading = true;
  renderCaption(type);
  setStatus(module.els.status, forceRefresh ? "正在刷新表格..." : "正在读取表格...", false, 0);

  try {
    module.items = parseCaptionCsv(await fetchCsv(module.url, forceRefresh), type === "cart");
    if (module.index >= module.items.length) module.index = Math.max(module.items.length - 1, 0);
    saveCaptionIndex(type);
    setStatus(module.els.status, "已读取 " + module.items.length + " 条文案。");
  } catch (error) {
    module.items = [];
    module.index = 0;
    setStatus(module.els.status, "读取失败，请检查 CSV 链接和字段名。", true, 0);
  } finally {
    module.loading = false;
    renderCaption(type);
  }
}

async function loadProductSheet(forceRefresh) {
  isProductLoading = true;
  renderProducts();
  setStatus(els.productStatus, forceRefresh ? "正在刷新商品表格..." : "正在读取商品表格...", false, 0);

  try {
    productItems = parseProductCsv(await fetchCsv(PRODUCT_SHEET_CSV_URL, forceRefresh));
    setStatus(els.productStatus, "已读取 " + productItems.length + " 个商品。");
  } catch (error) {
    productItems = [];
    setStatus(els.productStatus, "商品读取失败，请检查 CSV 链接和字段名。", true, 0);
  } finally {
    isProductLoading = false;
    renderProducts();
  }
}

async function fetchCsv(url, forceRefresh) {
  const finalUrl = forceRefresh ? url + (url.includes("?") ? "&" : "?") + "t=" + Date.now() : url;
  const res = await fetch(finalUrl, { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.text();
}

function parseCaptionCsv(csvText, hasProductName) {
  const rows = parseCsv(csvText);
  if (!rows.length) return [];

  const headers = rows[0].map((cell) => cleanCell(cell));
  const idIndex = findHeader(headers, ["排序编号", "编号"]);
  const productIndex = findHeader(headers, ["商品名称", "商品名"]);
  const copyIndex = findHeader(headers, ["可复制文案"]);
  const noteIndex = findHeader(headers, ["中文注释"]);
  if (copyIndex === -1 || noteIndex === -1) throw new Error("CSV 缺少必要字段");

  return rows.slice(1).reduce((result, row, rowIndex) => {
    const copyText = cleanCell(row[copyIndex]);
    if (isEmptyRow(row) || !copyText) return result;
    result.push({
      id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
      productName: hasProductName && productIndex >= 0 ? cleanCell(row[productIndex]) : "",
      copyText,
      note: cleanCell(row[noteIndex])
    });
    return result;
  }, []);
}

function parseProductCsv(csvText) {
  const rows = parseCsv(csvText);
  if (!rows.length) return [];

  const headers = rows[0].map((cell) => cleanCell(cell).toUpperCase());
  const idIndex = headers.indexOf("编号");
  const nameIndex = headers.indexOf("商品名");
  const pidIndex = headers.indexOf("PID");
  if (nameIndex === -1 || pidIndex === -1) throw new Error("CSV 缺少必要字段");

  return rows.slice(1).reduce((result, row, rowIndex) => {
    const name = cleanCell(row[nameIndex]);
    const pid = cleanPid(row[pidIndex]);
    if (isEmptyRow(row) || !name || !pid) return result;
    result.push({
      id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
      name,
      pid,
      url: PRODUCT_URL_PREFIX + pid
    });
    return result;
  }, []);
}

function findHeader(headers, names) {
  return headers.findIndex((header) => names.includes(header));
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }
    if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
      continue;
    }
    if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i += 1;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
      continue;
    }
    cell += char;
  }

  row.push(cell);
  rows.push(row);
  return rows.filter((currentRow) => currentRow.some((cellValue) => cleanCell(cellValue) !== ""));
}

function cleanCell(value) {
  return String(value || "").trim();
}

function cleanPid(value) {
  return cleanCell(value).replace(/\D/g, "");
}

function isEmptyRow(row) {
  return row.every((cell) => cleanCell(cell) === "");
}

function renderCaption(type) {
  const module = captionModules[type];
  const total = module.items.length;
  const item = module.items[module.index];
  const visibleIndex = total ? module.index + 1 : 0;

  module.els.total.textContent = String(total);
  module.els.position.textContent = visibleIndex + " / " + total;
  module.els.jumpInput.max = String(Math.max(total, 1));

  if (module.loading) {
    module.els.preview.value = "正在读取表格数据...";
    module.els.note.textContent = "正在读取表格数据...";
    if (module.els.productName) module.els.productName.textContent = "正在读取表格数据...";
  } else if (item) {
    module.els.preview.value = item.copyText;
    module.els.note.textContent = item.note || "无中文注释";
    if (module.els.productName) module.els.productName.textContent = item.productName || "无商品名";
  } else {
    module.els.preview.value = "";
    module.els.note.textContent = "没有可用文案。";
    if (module.els.productName) module.els.productName.textContent = "没有可用商品。";
  }

  const disabled = module.loading || total === 0;
  module.els.copyBtn.disabled = disabled;
  module.els.prevBtn.disabled = disabled || module.index <= 0;
  module.els.resetBtn.disabled = disabled || module.index === 0;
  module.els.jumpBtn.disabled = disabled;
  module.els.refreshBtn.disabled = module.loading;
}

function renderProducts() {
  const keyword = els.productSearch.value.trim().toLowerCase();
  const filtered = productItems.filter((item) => item.name.toLowerCase().includes(keyword));
  els.productCount.textContent = String(productItems.length);
  els.productRefreshBtn.disabled = isProductLoading;

  if (isProductLoading) {
    els.productList.innerHTML = '<div class="note">正在读取商品表格...</div>';
    return;
  }
  if (!filtered.length) {
    els.productList.innerHTML = '<div class="note">没有可用商品。</div>';
    return;
  }

  els.productList.innerHTML = filtered.map((item) => [
    '<div class="productItem">',
    '<span class="productNo">' + escapeHtml(item.id) + '</span>',
    '<a class="productName" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.name) + '</a>',
    '<button class="secondary copyLinkBtn" type="button" data-url="' + escapeHtml(item.url) + '">复制</button>',
    '</div>'
  ].join("")).join("");
}

async function copyNextCaption(type) {
  const module = captionModules[type];
  const item = module.items[module.index];
  if (!item) {
    setStatus(module.els.status, "没有可复制的文案。", true);
    return;
  }

  const copiedNumber = module.index + 1;
  const ok = await copyText(item.copyText);
  if (module.index < module.items.length - 1) {
    module.index += 1;
    saveCaptionIndex(type);
  }
  renderCaption(type);
  setStatus(module.els.status, ok ? "已复制第 " + copiedNumber + " 条。" : "自动复制失败，请长按文案框手动复制。", !ok, ok ? 1800 : 3500);
}

function prevCaption(type) {
  const module = captionModules[type];
  if (module.index > 0) {
    module.index -= 1;
    saveCaptionIndex(type);
    renderCaption(type);
    setStatus(module.els.status, "已回到第 " + (module.index + 1) + " 条。");
  }
}

function resetCaptionIndex(type) {
  const module = captionModules[type];
  module.index = 0;
  saveCaptionIndex(type);
  renderCaption(type);
  setStatus(module.els.status, "已重置到第 1 条。");
}

function jumpToCaption(type) {
  const module = captionModules[type];
  const target = cleanCell(module.els.jumpInput.value);
  if (!target) {
    setStatus(module.els.status, "请输入要跳转的编号。", true);
    return;
  }

  const foundIndex = module.items.findIndex((item) => item.id === target);
  if (foundIndex === -1) {
    setStatus(module.els.status, "没有找到编号 " + target + "。", true);
    return;
  }

  module.index = foundIndex;
  saveCaptionIndex(type);
  renderCaption(type);
  setStatus(module.els.status, "已跳转到编号 " + target + "。");
}

async function handleProductListClick(event) {
  const button = event.target.closest("[data-url]");
  if (!button) return;
  const ok = await copyText(button.dataset.url);
  setStatus(els.productStatus, ok ? "已复制商品链接。" : "自动复制失败，请长按链接手动复制。", !ok, ok ? 1800 : 3500);
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (error) {
      return fallbackCopy(text);
    }
  }
  return fallbackCopy(text);
}

function fallbackCopy(text) {
  try {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.top = "-1000px";
    textarea.style.left = "-1000px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(textarea);
    return ok;
  } catch (error) {
    return false;
  }
}

function setStatus(element, text, warning, duration) {
  element.textContent = text || "";
  element.className = warning ? "status warn" : "status";
  clearTimeout(element.statusTimer);
  if (text && duration !== 0) {
    element.statusTimer = setTimeout(() => {
      element.textContent = "";
      element.className = "status";
    }, duration || 1800);
  }
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>
