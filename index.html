<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mark 小工具">
<title>Mark 小工具</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --text: #101114;
    --muted: #70737a;
    --line: #e1e3e8;
    --soft: #f0f1f3;
    --primary: #111111;
    --ok: #137a3f;
    --warn: #a12a20;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }

  button, input, textarea { font: inherit; }

  .page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: max(18px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
  }

  .view { display: none; }
  .view.is-active { display: block; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .backBtn {
    width: auto;
    min-height: 42px;
    padding: 10px 13px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
    font-size: 15px;
  }

  .topTitle {
    min-width: 0;
    font-size: 20px;
    font-weight: 900;
    line-height: 1.2;
  }

  .hero {
    padding: 22px 2px 12px;
  }

  .hero h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.18;
    letter-spacing: 0;
  }

  .hero p {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
  }

  .menuGrid {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .menuCard {
    width: 100%;
    min-height: 118px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    text-align: left;
    box-shadow: 0 8px 22px rgba(16,17,20,.05);
  }

  .menuCard strong {
    display: block;
    font-size: 21px;
    line-height: 1.25;
  }

  .menuCard span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
    font-weight: 500;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 8px 22px rgba(16,17,20,.05);
  }

  .sectionTitle {
    margin: 0 0 8px;
    font-size: 21px;
    line-height: 1.25;
    letter-spacing: 0;
  }

  .sub {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 12px 0;
  }

  .stat {
    min-height: 66px;
    padding: 11px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.3;
  }

  .stat strong {
    display: block;
    margin-top: 6px;
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: 0;
  }

  .label {
    display: block;
    margin: 14px 0 7px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }

  textarea {
    width: 100%;
    min-height: 150px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 13px;
    background: #fff;
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    -webkit-appearance: none;
  }

  input {
    width: 100%;
    min-width: 0;
    height: 52px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0 12px;
    background: #fff;
    color: var(--text);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
  }

  button {
    width: 100%;
    min-height: 52px;
    border: none;
    border-radius: 8px;
    padding: 13px 15px;
    font-size: 16px;
    font-weight: 850;
    line-height: 1.25;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  button:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .primary { background: var(--primary); color: #fff; }
  .secondary { background: var(--soft); color: var(--text); }

  .note {
    min-height: 54px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .controls {
    display: grid;
    gap: 9px;
    margin-top: 13px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }

  .jumpBox {
    margin-top: 13px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }

  .jumpTitle {
    margin-bottom: 9px;
    font-size: 14px;
    font-weight: 850;
  }

  .jumpRow {
    display: grid;
    grid-template-columns: 1fr 94px;
    gap: 9px;
    align-items: stretch;
  }

  .status {
    min-height: 23px;
    margin-top: 12px;
    color: var(--ok);
    font-size: 14px;
    font-weight: 800;
    line-height: 1.45;
  }

  .status.warn { color: var(--warn); }

  .tip {
    margin: 9px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .productToolbar {
    display: grid;
    gap: 9px;
    margin: 13px 0;
  }

  .productList {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .productItem {
    display: grid;
    grid-template-columns: 42px 1fr 86px;
    gap: 9px;
    align-items: center;
    min-height: 58px;
    padding: 9px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .productNo {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: #f0f1f3;
    color: var(--muted);
    font-size: 14px;
    font-weight: 850;
  }

  .productName {
    min-width: 0;
    color: var(--text);
    text-decoration: none;
    font-size: 16px;
    font-weight: 850;
    line-height: 1.35;
    overflow-wrap: anywhere;
  }

  .copyLinkBtn {
    min-height: 40px;
    padding: 9px 10px;
    font-size: 14px;
  }

  @media (max-width: 420px) {
    .page { padding-left: 12px; padding-right: 12px; }
    .stats, .row, .jumpRow { grid-template-columns: 1fr; }
    .productItem { grid-template-columns: 38px 1fr; }
    .copyLinkBtn { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
  <main class="page">
    <section id="homeView" class="view is-active">
      <div class="hero">
        <h1>Mark 小工具</h1>
        <p>选择你现在要做的事。文案和商品链接都从 Google 表格读取，刷新页面就能拿到最新内容。</p>
      </div>

      <div class="menuGrid">
        <button class="menuCard" type="button" data-open-view="captionView">
          <strong>文案复制</strong>
          <span>按顺序复制下一条文案，中文注释只显示不复制。</span>
        </button>

        <button class="menuCard" type="button" data-open-view="productView">
          <strong>挂车链接</strong>
          <span>点商品名打开商品页，也可以一键复制完整商品链接。</span>
        </button>
      </div>
    </section>

    <section id="captionView" class="view">
      <div class="topbar">
        <button class="backBtn" type="button" data-open-view="homeView">返回</button>
        <div class="topTitle">文案复制</div>
      </div>

      <div class="card">
        <p class="sub">复制时只复制「可复制文案」。编号和中文注释不会进入剪贴板。</p>

        <div class="stats" aria-live="polite">
          <div class="stat"><span>已读取文案</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>当前进度</span><strong id="positionText">0 / 0</strong></div>
        </div>

        <label class="label" for="preview">当前文案</label>
        <textarea id="preview" readonly placeholder="正在读取表格数据..."></textarea>

        <span class="label">中文翻译 / 中文注释</span>
        <div class="note" id="note">正在读取表格数据...</div>

        <div class="controls">
          <button id="copyBtn" class="primary" type="button">复制下一条文案</button>
          <div class="row">
            <button id="prevBtn" class="secondary" type="button">上一条</button>
            <button id="resetBtn" class="secondary" type="button">重置到第 1 条</button>
          </div>
          <button id="refreshBtn" class="secondary" type="button">刷新文案表格</button>
        </div>

        <div class="jumpBox">
          <div class="jumpTitle">跳转到指定编号</div>
          <div class="jumpRow">
            <input id="jumpInput" type="number" inputmode="numeric" min="1" placeholder="输入编号">
            <button id="jumpBtn" class="secondary" type="button">跳转</button>
          </div>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>
        <p class="tip">如果 iPhone Safari 自动复制失败，请长按文案框手动复制。</p>
      </div>
    </section>

    <section id="productView" class="view">
      <div class="topbar">
        <button class="backBtn" type="button" data-open-view="homeView">返回</button>
        <div class="topTitle">挂车链接</div>
      </div>

      <div class="card">
        <p class="sub">商品表只填「编号、商品名、PID」。网页会自动补全 TikTok 商品链接。</p>

        <div class="stats" aria-live="polite">
          <div class="stat"><span>已读取商品</span><strong id="productCount">0</strong></div>
          <div class="stat"><span>链接前缀</span><strong>自动</strong></div>
        </div>

        <div class="productToolbar">
          <input id="productSearch" type="search" placeholder="搜索商品名">
          <button id="productRefreshBtn" class="secondary" type="button">刷新商品表格</button>
        </div>

        <div class="productList" id="productList"></div>
        <div class="status" id="productStatus" role="status" aria-live="polite"></div>
        <p class="tip">点商品名打开商品页；点「复制」复制完整商品链接。</p>
      </div>
    </section>
  </main>

<script>
const CAPTION_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5lhOtFR46NsxGgHJrrymb0xWFRgqXPU8cLMzpfDdnb8Eu1OpNVPkQbqMcLtwcM0BgYr4SIfVrfX1_/pub?output=csv";
const PRODUCT_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5lhOtFR46NsxGgHJrrymb0xWFRgqXPU8cLMzpfDdnb8Eu1OpNVPkQbqMcLtwcM0BgYr4SIfVrfX1_/pub?gid=2097162834&single=true&output=csv";
const PRODUCT_URL_PREFIX = "https://shop.tiktok.com/view/product/";
const CAPTION_STORAGE_KEY = "caption_copy_google_sheet_index_v1";

let captionItems = [];
let currentIndex = 0;
let isCaptionLoading = false;
let productItems = [];
let isProductLoading = false;

const els = {};

document.addEventListener("DOMContentLoaded", () => {
  cacheElements();
  bindEvents();
  loadCaptionIndex();
  loadCaptionSheet(false);
  loadProductSheet(false);
});

function cacheElements() {
  els.views = document.querySelectorAll(".view");
  els.totalCount = document.getElementById("totalCount");
  els.positionText = document.getElementById("positionText");
  els.preview = document.getElementById("preview");
  els.note = document.getElementById("note");
  els.copyBtn = document.getElementById("copyBtn");
  els.prevBtn = document.getElementById("prevBtn");
  els.resetBtn = document.getElementById("resetBtn");
  els.refreshBtn = document.getElementById("refreshBtn");
  els.jumpInput = document.getElementById("jumpInput");
  els.jumpBtn = document.getElementById("jumpBtn");
  els.status = document.getElementById("status");
  els.productCount = document.getElementById("productCount");
  els.productSearch = document.getElementById("productSearch");
  els.productRefreshBtn = document.getElementById("productRefreshBtn");
  els.productList = document.getElementById("productList");
  els.productStatus = document.getElementById("productStatus");
}

function bindEvents() {
  document.querySelectorAll("[data-open-view]").forEach((button) => {
    button.addEventListener("click", () => showView(button.dataset.openView));
  });

  els.copyBtn.addEventListener("click", copyNextCaption);
  els.prevBtn.addEventListener("click", prevCaption);
  els.resetBtn.addEventListener("click", resetCaptionIndex);
  els.refreshBtn.addEventListener("click", () => loadCaptionSheet(true));
  els.jumpBtn.addEventListener("click", jumpToCaption);
  els.jumpInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") jumpToCaption();
  });
  els.productRefreshBtn.addEventListener("click", () => loadProductSheet(true));
  els.productSearch.addEventListener("input", renderProducts);
  els.productList.addEventListener("click", handleProductListClick);
}

function showView(viewId) {
  els.views.forEach((view) => view.classList.toggle("is-active", view.id === viewId));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function loadCaptionIndex() {
  const saved = parseInt(localStorage.getItem(CAPTION_STORAGE_KEY) || "0", 10);
  currentIndex = Number.isFinite(saved) && saved >= 0 ? saved : 0;
}

function saveCaptionIndex() {
  localStorage.setItem(CAPTION_STORAGE_KEY, String(currentIndex));
}

async function loadCaptionSheet(forceRefresh) {
  isCaptionLoading = true;
  renderCaption();
  setStatus(els.status, forceRefresh ? "正在刷新文案表格..." : "正在读取文案表格...", false, 0);

  try {
    captionItems = parseCaptionCsv(await fetchCsv(CAPTION_SHEET_CSV_URL, forceRefresh));
    if (currentIndex >= captionItems.length) currentIndex = Math.max(captionItems.length - 1, 0);
    saveCaptionIndex();
    setStatus(els.status, "已读取 " + captionItems.length + " 条文案。");
  } catch (error) {
    captionItems = [];
    currentIndex = 0;
    setStatus(els.status, "文案读取失败，请检查 CSV 链接和字段名。", true, 0);
  } finally {
    isCaptionLoading = false;
    renderCaption();
  }
}

async function loadProductSheet(forceRefresh) {
  isProductLoading = true;
  renderProducts();
  setStatus(els.productStatus, forceRefresh ? "正在刷新商品表格..." : "正在读取商品表格...", false, 0);

  try {
    productItems = parseProductCsv(await fetchCsv(PRODUCT_SHEET_CSV_URL, forceRefresh));
    setStatus(els.productStatus, "已读取 " + productItems.length + " 个商品。");
  } catch (error) {
    productItems = [];
    setStatus(els.productStatus, "商品读取失败，请检查 CSV 链接和字段名。", true, 0);
  } finally {
    isProductLoading = false;
    renderProducts();
  }
}

async function fetchCsv(url, forceRefresh) {
  const finalUrl = forceRefresh ? url + (url.includes("?") ? "&" : "?") + "t=" + Date.now() : url;
  const res = await fetch(finalUrl, { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.text();
}

function parseCaptionCsv(csvText) {
  const rows = parseCsv(csvText);
  if (!rows.length) return [];
  const headers = rows[0].map((cell) => cleanCell(cell));
  const idIndex = headers.indexOf("编号");
  const copyIndex = headers.indexOf("可复制文案");
  const noteIndex = headers.indexOf("中文注释");
  if (copyIndex === -1 || noteIndex === -1) throw new Error("CSV 缺少必要字段");

  return rows.slice(1).reduce((result, row, rowIndex) => {
    const copyText = cleanCell(row[copyIndex]);
    if (isEmptyRow(row) || !copyText) return result;
    result.push({
      id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
      copyText,
      note: cleanCell(row[noteIndex])
    });
    return result;
  }, []);
}

function parseProductCsv(csvText) {
  const rows = parseCsv(csvText);
  if (!rows.length) return [];
  const headers = rows[0].map((cell) => cleanCell(cell).toUpperCase());
  const idIndex = headers.indexOf("编号");
  const nameIndex = headers.indexOf("商品名");
  const pidIndex = headers.indexOf("PID");
  if (nameIndex === -1 || pidIndex === -1) throw new Error("CSV 缺少必要字段");

  return rows.slice(1).reduce((result, row, rowIndex) => {
    const name = cleanCell(row[nameIndex]);
    const pid = cleanPid(row[pidIndex]);
    if (isEmptyRow(row) || !name || !pid) return result;
    result.push({
      id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
      name,
      pid,
      url: PRODUCT_URL_PREFIX + pid
    });
    return result;
  }, []);
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }
    if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
      continue;
    }
    if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i += 1;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
      continue;
    }
    cell += char;
  }

  row.push(cell);
  rows.push(row);
  return rows.filter((currentRow) => currentRow.some((cellValue) => cleanCell(cellValue) !== ""));
}

function cleanCell(value) {
  return String(value || "").trim();
}

function cleanPid(value) {
  return cleanCell(value).replace(/\D/g, "");
}

function isEmptyRow(row) {
  return row.every((cell) => cleanCell(cell) === "");
}

function renderCaption() {
  const total = captionItems.length;
  const item = captionItems[currentIndex];
  const visibleIndex = total ? currentIndex + 1 : 0;
  els.totalCount.textContent = String(total);
  els.positionText.textContent = visibleIndex + " / " + total;
  els.jumpInput.max = String(Math.max(total, 1));

  if (isCaptionLoading) {
    els.preview.value = "正在读取表格数据...";
    els.note.textContent = "正在读取表格数据...";
  } else if (item) {
    els.preview.value = item.copyText;
    els.note.textContent = item.note || "无中文注释";
  } else {
    els.preview.value = "";
    els.note.textContent = "没有可用文案。";
  }

  const disabled = isCaptionLoading || total === 0;
  els.copyBtn.disabled = disabled;
  els.prevBtn.disabled = disabled || currentIndex <= 0;
  els.resetBtn.disabled = disabled || currentIndex === 0;
  els.jumpBtn.disabled = disabled;
  els.refreshBtn.disabled = isCaptionLoading;
}

function renderProducts() {
  const keyword = els.productSearch.value.trim().toLowerCase();
  const filtered = productItems.filter((item) => item.name.toLowerCase().includes(keyword));
  els.productCount.textContent = String(productItems.length);
  els.productRefreshBtn.disabled = isProductLoading;

  if (isProductLoading) {
    els.productList.innerHTML = '<div class="note">正在读取商品表格...</div>';
    return;
  }

  if (!filtered.length) {
    els.productList.innerHTML = '<div class="note">没有可用商品。</div>';
    return;
  }

  els.productList.innerHTML = filtered.map((item) => [
    '<div class="productItem">',
    '<span class="productNo">' + escapeHtml(item.id) + '</span>',
    '<a class="productName" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.name) + '</a>',
    '<button class="secondary copyLinkBtn" type="button" data-url="' + escapeHtml(item.url) + '">复制</button>',
    '</div>'
  ].join("")).join("");
}

async function copyNextCaption() {
  const item = captionItems[currentIndex];
  if (!item) {
    setStatus(els.status, "没有可复制的文案。", true);
    return;
  }

  const copiedNumber = currentIndex + 1;
  const ok = await copyText(item.copyText);
  if (currentIndex < captionItems.length - 1) {
    currentIndex += 1;
    saveCaptionIndex();
  }
  renderCaption();
  setStatus(els.status, ok ? "已复制第 " + copiedNumber + " 条。" : "自动复制失败，请长按文案框手动复制。", !ok, ok ? 1800 : 3500);
}

function prevCaption() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    saveCaptionIndex();
    renderCaption();
    setStatus(els.status, "已回到第 " + (currentIndex + 1) + " 条。");
  }
}

function resetCaptionIndex() {
  currentIndex = 0;
  saveCaptionIndex();
  renderCaption();
  setStatus(els.status, "已重置到第 1 条。");
}

function jumpToCaption() {
  const target = cleanCell(els.jumpInput.value);
  if (!target) {
    setStatus(els.status, "请输入要跳转的编号。", true);
    return;
  }

  const foundIndex = captionItems.findIndex((item) => item.id === target);
  if (foundIndex === -1) {
    setStatus(els.status, "没有找到编号 " + target + "。", true);
    return;
  }

  currentIndex = foundIndex;
  saveCaptionIndex();
  renderCaption();
  setStatus(els.status, "已跳转到编号 " + target + "。");
}

async function handleProductListClick(event) {
  const button = event.target.closest("[data-url]");
  if (!button) return;

  const ok = await copyText(button.dataset.url);
  setStatus(els.productStatus, ok ? "已复制商品链接。" : "自动复制失败，请长按链接手动复制。", !ok, ok ? 1800 : 3500);
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (error) {
      return fallbackCopy(text);
    }
  }
  return fallbackCopy(text);
}

function fallbackCopy(text) {
  try {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.top = "-1000px";
    textarea.style.left = "-1000px";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(textarea);
    return ok;
  } catch (error) {
    return false;
  }
}

function setStatus(element, text, warning, duration) {
  element.textContent = text || "";
  element.className = warning ? "status warn" : "status";
  clearTimeout(element.statusTimer);

  if (text && duration !== 0) {
    element.statusTimer = setTimeout(() => {
      element.textContent = "";
      element.className = "status";
    }, duration || 1800);
  }
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
