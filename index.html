<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>文案复制器</title>
<style>
  :root { --bg:#f6f6f7; --card:#fff; --text:#111; --muted:#666; --line:#ddd; --soft:#e9e9ec; --primary:#111; }
  * { box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    margin:0; padding:22px; background:var(--bg); color:var(--text);
  }
  .card {
    max-width:720px; margin:0 auto; background:var(--card); border-radius:18px; padding:22px;
    box-shadow:0 8px 28px rgba(0,0,0,.08);
  }
  h1 { font-size:24px; margin:0 0 8px; }
  .sub { color:var(--muted); font-size:14px; margin-bottom:16px; line-height:1.5; }
  .counter { font-size:16px; margin:12px 0; font-weight:700; }
  textarea {
    width:100%; min-height:190px; border:1px solid var(--line); border-radius:14px; padding:14px;
    font-size:16px; line-height:1.45; resize:vertical; background:#fff;
  }
  button {
    width:100%; border:none; border-radius:14px; padding:16px; font-size:18px; font-weight:700;
    margin-top:12px; cursor:pointer;
  }
  .primary { background:var(--primary); color:white; }
  .secondary { background:var(--soft); color:var(--text); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .jumpBox { margin-top:16px; padding:14px; border:1px solid #e5e5e8; border-radius:16px; background:#fafafa; }
  .jumpTitle { font-weight:700; margin-bottom:10px; }
  .jumpRow { display:grid; grid-template-columns:1fr 112px; gap:10px; align-items:center; }
  input {
    width:100%; height:52px; border:1px solid var(--line); border-radius:14px; padding:0 14px;
    font-size:18px; outline:none;
  }
  .jumpBtn { height:52px; padding:0 12px; margin-top:0; font-size:16px; }
  .status { min-height:22px; margin-top:12px; color:#0a7a35; font-size:14px; font-weight:600; }
  .tip { margin-top:14px; font-size:13px; color:var(--muted); line-height:1.5; }
</style>
</head>
<body>
  <div class="card">
    <h1>文案复制器</h1>
    <div class="sub">每点一次「复制下一条」，就会自动复制下一条法语文案。没有弹窗，适合连续发布。</div>
    <div class="counter" id="counter">准备中...</div>
    <textarea id="preview" readonly></textarea>
    <button class="primary" onclick="copyNext()">复制下一条文案</button>
    <div class="row">
      <button class="secondary" onclick="prevOne()">上一条</button>
      <button class="secondary" onclick="resetIndex()">重置到第 1 条</button>
    </div>
    <div class="jumpBox">
      <div class="jumpTitle">跳转到指定编号</div>
      <div class="jumpRow">
        <input id="jumpInput" type="number" min="1" max="50" placeholder="输入编号，例如 25">
        <button class="secondary jumpBtn" onclick="jumpTo()">跳转</button>
      </div>
      <div class="tip">跳转后不会自动复制，需要再点「复制下一条文案」。</div>
    </div>
    <div class="status" id="status"></div>
    <div class="tip">
      用法：iPhone Safari 打开后，点「复制下一条文案」，回 TikTok 文案框粘贴。<br>
      建议 Safari 打开后点「分享」→「添加到主屏幕」，以后就像 App 一样使用。
    </div>
  </div>
<script>
const captions = ["C’est le moment de remplacer tout ce qui te pourrit la vie. Boutique = la bonne adresse.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "Tu veux la même sensation que dans la vidéo ? Un clic sur le Boutique et c’est parti.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "Plus jamais de galère à la maison grâce au TikTok Boutique. Viens voir.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "Ce gadget mérite d’être dans ta cuisine. Boutique, c’est par ici ➡️#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode", "Ne cherche plus, la pépite est sur le Boutique. Clique et adopte-la.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Beaute", "Un seul endroit pour dénicher des trucs qui déchirent : le TikTok Boutique. Vas-y.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Sport", "La vidéo ne ment pas : le Boutique t’attend. Fonce découvrir les bonnes affaires.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "Stop aux appareils qui te ruinent la vie. Le TikTok Boutique a ce qu’il te faut.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "Un clic sur le Boutique et tu changes tout. Allez, ose.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #BonsPlans", "T’en as plein le dos des produits qui cassent ? Le Boutique t’attend.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #PasCher", "La vie est trop courte pour utiliser des trucs pourris. Va voir sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "La vidéo ne ment pas : la solution existe. Boutique = clic.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "Tu veux la même fin heureuse ? Le Boutique n’attend que toi.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "Fini les crises et les explosions. Le TikTok Boutique a la réponse.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode", "La bonne affaire est sur le Boutique. Un clic et elle est à toi.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Beaute", "Ne rate pas ce genre de pépite. Le Boutique, c’est magique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Sport", "Ça te parle ? Alors direction le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "Arrête de lutter avec du matos pourri. TikTok Boutique = solution.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #BonsPlans", "C’est le genre de produit qui change la donne. Boutique, je te dis.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #PasCher", "La magie du TikTok Boutique, tu veux l’essayer ? Clique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "Le bon plan est là, sous tes yeux. Boutique, un clic et c’est bon.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "Fais comme dans la vidéo : va sur le Boutique et sois heureux.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "Ta maison mérite mieux. Le Boutique a ce qu’il faut.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode", "Pas besoin de chercher loin. Le TikTok Boutique t’attend.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Beaute", "La vidéo a raison : le Boutique va te sauver.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Sport", "Tu cherches la pépite ? Elle est sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "Un monde sans galère commence par un clic sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #BonsPlans", "Ce que tu vois, tu peux l’avoir. Boutique, c’est facile.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #PasCher", "La bonne idée est sur le Boutique. Va voir.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "Plus jamais de scènes comme au début. Le Boutique change tout.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "La solution est à portée de clic. TikTok Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "Fais confiance à la vidéo, le Boutique a tout prévu.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode", "Ce n’est pas de la magie, c’est le TikTok Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Beaute", "La vie de rêve commence au Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Sport", "Tu as vu le résultat ? Alors qu’est-ce que tu attends ? Boutique !#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "Cliquer sur le Boutique, c’est le premier pas vers une vie plus simple.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #BonsPlans", "Tout ce que tu détestes, le Boutique a la version qui te plaira.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #PasCher", "Le Boutique, c’est l’endroit où les problèmes disparaissent.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "Inspiré par la vidéo ? Va craquer sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "Ce petit truc va te changer la vie. Boutique, je te jure.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "La meilleure décision de ta journée : un clic sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode", "Ne laisse pas une mauvaise machine gâcher ta vie. Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Beaute", "C’est prouvé par la vidéo : le Boutique a la solution.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Sport", "Tu veux la même fin heureuse ? Boutique, un clic.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Shopping", "La vidéo t’a montré le chemin. Le Boutique est la destination.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #BonsPlans", "Fini les mauvaises surprises. Le TikTok Boutique, c’est la fiabilité.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #PasCher", "La pépite du jour est sur le Boutique. Ne la rate pas.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #IdeeShopping", "Le Boutique, c’est la clé pour en finir avec les produits pourris.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Trouvailles", "La vie sans casse, c’est possible. Rendez-vous sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Maison", "Tout ce que tu vois dans la vidéo, tu peux l’avoir sur le Boutique.#TikTokShop #TikTokShopFrance #Boutique #BonPlan #Mode"];
const total = captions.length;

function getIndex() {
  let n = parseInt(localStorage.getItem("caption_index") || "0", 10);
  if (isNaN(n) || n < 0) n = 0;
  if (n >= total) n = total;
  return n;
}
function setIndex(n) {
  localStorage.setItem("caption_index", String(n));
  updatePreview();
}
function setStatus(text) {
  const status = document.getElementById("status");
  status.textContent = text || "";
  if (text) {
    clearTimeout(window.__statusTimer);
    window.__statusTimer = setTimeout(() => { status.textContent = ""; }, 1200);
  }
}
function updatePreview() {
  const i = getIndex();
  const counter = document.getElementById("counter");
  const preview = document.getElementById("preview");
  const jumpInput = document.getElementById("jumpInput");
  jumpInput.max = total;
  if (i >= total) {
    counter.textContent = `已到最后：共 ${total} 条，当前没有下一条`;
    preview.value = "文案已经全部复制完。需要重新开始请点“重置到第 1 条”，或输入编号跳转。";
  } else {
    counter.textContent = `下一条：第 ${i + 1} / ${total} 条`;
    preview.value = captions[i];
  }
}
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    const ta = document.getElementById("preview");
    ta.focus();
    ta.select();
    return document.execCommand("copy");
  }
}
async function copyNext() {
  const i = getIndex();
  if (i >= total) {
    setStatus("已经复制完全部文案");
    updatePreview();
    return;
  }
  const ok = await copyText(captions[i]);
  if (ok) {
    setIndex(i + 1);
    setStatus(`已复制第 ${i + 1} 条`);
  } else {
    setStatus("复制失败，请长按文本框手动复制");
  }
}
function resetIndex() {
  setIndex(0);
  setStatus("已重置到第 1 条");
}
function prevOne() {
  const i = getIndex();
  setIndex(Math.max(0, i - 1));
  setStatus("已回到上一条");
}
function jumpTo() {
  const input = document.getElementById("jumpInput");
  let n = parseInt(input.value, 10);
  if (isNaN(n)) {
    setStatus("请输入有效编号");
    input.focus();
    return;
  }
  if (n < 1) n = 1;
  if (n > total) n = total;
  setIndex(n - 1);
  input.value = "";
  setStatus(`已跳转到第 ${n} 条`);
}
document.getElementById("jumpInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") jumpTo();
});
updatePreview();
</script>
</body>
</html>
