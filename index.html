<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="文案复制器">
<title>文案复制器</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --text: #111111;
    --muted: #666666;
    --line: #dddddf;
    --soft: #eeeeef;
    --primary: #111111;
    --ok: #0a7a35;
    --warn: #9f2a20;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }
  button, input, textarea { font: inherit; }
  .page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
  }
  .card {
    background: var(--card);
    border: 1px solid #ececef;
    border-radius: 8px;
    padding: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,.06);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    line-height: 1.25;
    letter-spacing: 0;
  }
  .sub {
    margin: 0 0 16px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 14px 0;
  }
  .stat {
    min-height: 72px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }
  .stat span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.3;
  }
  .stat strong {
    display: block;
    margin-top: 6px;
    font-size: 21px;
    line-height: 1.2;
    letter-spacing: 0;
  }
  .label {
    display: block;
    margin: 16px 0 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }
  textarea {
    width: 100%;
    min-height: 168px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 13px;
    background: #fff;
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    -webkit-appearance: none;
  }
  .note {
    min-height: 58px;
    padding: 13px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .controls {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    width: 100%;
    min-height: 54px;
    border: none;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 17px;
    font-weight: 800;
    line-height: 1.25;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  .primary { background: var(--primary); color: #fff; }
  .secondary { background: var(--soft); color: var(--text); }
  .jumpBox {
    margin-top: 14px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fafafa;
  }
  .jumpTitle {
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 800;
  }
  .jumpRow {
    display: grid;
    grid-template-columns: 1fr 104px;
    gap: 10px;
    align-items: stretch;
  }
  input {
    width: 100%;
    min-width: 0;
    height: 54px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0 12px;
    background: #fff;
    color: var(--text);
    font-size: 17px;
    outline: none;
    -webkit-appearance: none;
  }
  .status {
    min-height: 24px;
    margin-top: 14px;
    color: var(--ok);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
  }
  .status.warn { color: var(--warn); }
  .tip {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }
  @media (max-width: 380px) {
    .page { padding-left: 12px; padding-right: 12px; }
    .card { padding: 14px; }
    .stats, .row, .jumpRow { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="title">
      <h1 id="title">文案复制器</h1>
      <p class="sub">从公开 Google 表格 CSV 自动读取文案。页面会显示中文翻译/注释，但复制时只复制「可复制文案」。</p>
      <div class="stats" aria-live="polite">
        <div class="stat"><span>已读取文案数量</span><strong id="totalCount">0</strong></div>
        <div class="stat"><span>当前进度</span><strong id="positionText">0 / 0</strong></div>
      </div>
      <label class="label" for="preview">当前文案预览</label>
      <textarea id="preview" readonly placeholder="正在读取表格数据..."></textarea>
      <span class="label">中文翻译 / 中文注释</span>
      <div class="note" id="note">正在读取表格数据...</div>
      <div class="controls">
        <button id="copyBtn" class="primary" type="button">复制下一条文案</button>
        <div class="row">
          <button id="prevBtn" class="secondary" type="button">上一条</button>
          <button id="resetBtn" class="secondary" type="button">重置到第 1 条</button>
        </div>
        <button id="refreshBtn" class="secondary" type="button">刷新表格数据</button>
      </div>
      <div class="jumpBox">
        <div class="jumpTitle">跳转到指定编号</div>
        <div class="jumpRow">
          <input id="jumpInput" type="number" inputmode="numeric" min="1" placeholder="输入编号">
          <button id="jumpBtn" class="secondary" type="button">跳转</button>
        </div>
      </div>
      <div class="status" id="status" role="status" aria-live="polite"></div>
      <p class="tip">如果 iPhone Safari 自动复制失败，请长按上方文本框手动复制。中文翻译/注释只用于查看，不会复制。</p>
    </section>
  </main>
<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5lhOtFR46NsxGgHJrrymb0xWFRgqXPU8cLMzpfDdnb8Eu1OpNVPkQbqMcLtwcM0BgYr4SIfVrfX1_/pub?output=csv";
const STORAGE_KEY = "caption_copy_google_sheet_index_v1";

let items = [];
let currentIndex = 0;
let isLoading = false;
const els = {};

document.addEventListener("DOMContentLoaded", () => {
  cacheElements();
  bindEvents();
  loadIndex();
  loadSheet(false);
});

function cacheElements() {
  els.totalCount = document.getElementById("totalCount");
  els.positionText = document.getElementById("positionText");
  els.preview = document.getElementById("preview");
  els.note = document.getElementById("note");
  els.copyBtn = document.getElementById("copyBtn");
  els.prevBtn = document.getElementById("prevBtn");
  els.resetBtn = document.getElementById("resetBtn");
  els.refreshBtn = document.getElementById("refreshBtn");
  els.jumpInput = document.getElementById("jumpInput");
  els.jumpBtn = document.getElementById("jumpBtn");
  els.status = document.getElementById("status");
}

function bindEvents() {
  els.copyBtn.addEventListener("click", copyNext);
  els.prevBtn.addEventListener("click", prevOne);
  els.resetBtn.addEventListener("click", resetIndex);
  els.refreshBtn.addEventListener("click", () => loadSheet(true));
  els.jumpBtn.addEventListener("click", jumpTo);
  els.jumpInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") jumpTo();
  });
}

function loadIndex() {
  const saved = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);
  currentIndex = Number.isFinite(saved) && saved >= 0 ? saved : 0;
}

function saveIndex() {
  localStorage.setItem(STORAGE_KEY, String(currentIndex));
}

async function loadSheet(forceRefresh) {
  if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("这里填写")) {
    items = [];
    currentIndex = 0;
    render();
    setStatus("请先在 index.html 顶部填写 SHEET_CSV_URL。", true, 0);
    return;
  }

  isLoading = true;
  render();
  setStatus(forceRefresh ? "正在刷新表格数据..." : "正在读取表格数据...", false, 0);

  try {
    const url = forceRefresh ? SHEET_CSV_URL + "&t=" + Date.now() : SHEET_CSV_URL;
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    items = parseSheetCsv(await res.text());
    if (currentIndex >= items.length) currentIndex = Math.max(items.length - 1, 0);
    saveIndex();
    setStatus("已读取 " + items.length + " 条文案。");
  } catch (error) {
    items = [];
    currentIndex = 0;
    setStatus("读取失败，请检查 CSV 链接是否公开可访问。", true, 0);
  } finally {
    isLoading = false;
    render();
  }
}

function parseSheetCsv(csvText) {
  const rows = parseCsv(csvText);
  if (!rows.length) return [];
  const headers = rows[0].map((cell) => cleanCell(cell));
  const idIndex = headers.indexOf("编号");
  const copyIndex = headers.indexOf("可复制文案");
  const noteIndex = headers.indexOf("中文注释");
  if (copyIndex === -1 || noteIndex === -1) throw new Error("CSV 缺少必要字段");

  return rows.slice(1).reduce((result, row, rowIndex) => {
    const isEmptyRow = row.every((cell) => cleanCell(cell) === "");
    const copyText = cleanCell(row[copyIndex]);
    if (isEmptyRow || !copyText) return result;
    result.push({
      id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
      copyText,
      note: cleanCell(row[noteIndex])
    });
    return result;
  }, []);
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }
    if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
      continue;
    }
    if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i += 1;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
      continue;
    }
    cell += char;
  }
  row.push(cell);
  rows.push(row);
  return rows.filter((currentRow) => currentRow.some((cellValue) => cleanCell(cellValue) !== ""));
}

function cleanCell(value) {
  return String(value || "").trim();
}

function render() {
  const total = items.length;
  const item = items[currentIndex];
  const visibleIndex = total ? currentIndex + 1 : 0;
  els.totalCount.textContent = String(total);
  els.positionText.textContent = visibleIndex + " / " + total;
  els.jumpInput.max = String(Math.max(total, 1));
  if (isLoading) {
    els.preview.value = "正在读取表格数据...";
    els.note.textContent = "正在读取表格数据...";
  } else if (item) {
    els.preview.value = item.copyText;
    els.note.textContent = item.note || "无中文注释";
  } else {
    els.preview.value = "";
    els.note.textContent = "没有可用文案。";
  }
  const disabled = isLoading || total === 0;
  els.copyBtn.disabled = disabled;
  els.prevBtn.disabled = disabled || currentIndex <= 0;
  els.resetBtn.disabled = disabled || currentIndex === 0;
  els.jumpBtn.disabled = disabled;
  els.refreshBtn.disabled = isLoading;
}

async function copyNext() {
  const item = items[currentIndex];
  if (!item) {
    setStatus("没有可复制的文案。", true);
    return;
  }
  const copiedNumber = currentIndex + 1;
  const ok = await copyText(item.copyText);
  if (currentIndex < items.length - 1) {
    currentIndex += 1;
    saveIndex();
  }
  render();
  setStatus(ok ? "已复制第 " + copiedNumber + " 条。" : "自动复制失败，请长按文本框手动复制。", !ok, ok ? 1800 : 3500);
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (error) {
      return fallbackCopy();
    }
  }
  return fallbackCopy();
}

function fallbackCopy() {
  try {
    els.preview.focus();
    els.preview.select();
    els.preview.setSelectionRange(0, els.preview.value.length);
    return document.execCommand("copy");
  } catch (error) {
    return false;
  }
}

function prevOne() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    saveIndex();
    render();
    setStatus("已回到第 " + (currentIndex + 1) + " 条。");
  }
}

function resetIndex() {
  currentIndex = 0;
  saveIndex();
  render();
  setStatus("已重置到第 1 条。");
}

function jumpTo() {
  const target = cleanCell(els.jumpInput.value);
  if (!target) {
    setStatus("请输入要跳转的编号。", true);
    return;
  }
  const foundIndex = items.findIndex((item) => item.id === target);
  if (foundIndex === -1) {
    setStatus("没有找到编号 " + target + "。", true);
    return;
  }
  currentIndex = foundIndex;
  saveIndex();
  render();
  setStatus("已跳转到编号 " + target + "。");
}

function setStatus(text, warning, duration) {
  els.status.textContent = text || "";
  els.status.className = warning ? "status warn" : "status";
  clearTimeout(window.__statusTimer);
  if (text && duration !== 0) {
    window.__statusTimer = setTimeout(() => {
      els.status.textContent = "";
      els.status.className = "status";
    }, duration || 1800);
  }
}
</script>
</body>
</html>
