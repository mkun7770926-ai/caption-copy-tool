<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mark 的个人小工具">
  <title>Mark 的个人小工具</title>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: rgba(255, 255, 255, .88);
      --panel-strong: #ffffff;
      --text: #101828;
      --muted: #64748b;
      --line: rgba(156, 178, 207, .42);
      --blue: #1268ff;
      --navy: #0b1f55;
      --soft: #f3f7fc;
      --dark: #101828;
      --note: #fff4cf;
      --ok: #047857;
      --warn: #b42318;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 4%, rgba(65, 190, 255, .34), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(18, 104, 255, .24), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }

    button, select, input, textarea { font: inherit; }

    .page {
      width: 100%;
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 14px max(26px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
    }

    .shell { width: 100%; }

    .hero, .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, .86);
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(16, 43, 92, .14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 22px;
      margin-bottom: 14px;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      right: -120px;
      top: -130px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(18,104,255,.22), transparent 68%);
      pointer-events: none;
    }

    .brand {
      position: relative;
      display: flex;
      gap: 13px;
      align-items: center;
      margin-bottom: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(145deg, #101828, #123a8c);
      color: #fff;
      font-size: 26px;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(16, 43, 92, .24);
    }

    h1, h2, p { margin: 0; }
    h1 { font-size: 25px; line-height: 1.2; letter-spacing: 0; }
    h2 { font-size: 25px; line-height: 1.25; letter-spacing: 0; }

    .eyebrow {
      margin-top: 4px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 900;
    }

    .sub {
      position: relative;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .archiveTag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin-top: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(18, 104, 255, .10);
      color: #1647a8;
      font-size: 12px;
      font-weight: 900;
    }

    .modeGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .modeBtn {
      min-height: 74px;
      padding: 14px 16px;
      text-align: left;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 16px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(16, 43, 92, .08);
    }

    .modeBtn span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .panel {
      display: none;
      padding: 18px;
    }

    .panel.active { display: block; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .backBtn {
      width: auto;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 13px;
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 15px;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .stat {
      min-height: 76px;
      padding: 11px 8px;
      border-radius: 15px;
      background: var(--soft);
      border: 1px solid var(--line);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      line-height: 1;
    }

    button, select, input, textarea {
      border-radius: 15px;
      -webkit-tap-highlight-color: transparent;
    }

    button, select, input {
      min-height: 54px;
    }

    button {
      width: 100%;
      border: 0;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
    }

    button:disabled { opacity: .48; cursor: not-allowed; }
    .primary { background: linear-gradient(135deg, #101828, #1647a8); color: #fff; box-shadow: 0 16px 30px rgba(16, 43, 92, .22); }
    .secondary { background: var(--soft); color: var(--text); border: 1px solid var(--line); }

    select, input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 0 13px;
      font-size: 16px;
      outline: none;
    }

    textarea {
      width: 100%;
      min-height: 154px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 14px;
      font-size: 16px;
      line-height: 1.55;
      outline: none;
      resize: vertical;
      -webkit-appearance: none;
    }

    .fieldLabel {
      display: block;
      margin: 14px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .result {
      display: block;
      margin-top: 14px;
    }

    .copyText {
      padding: 15px;
      border-radius: 17px;
      background: linear-gradient(145deg, #101828, #0b1f55);
      color: #fff;
      font-size: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      user-select: text;
    }

    .note {
      margin-top: 10px;
      padding: 13px;
      border-radius: 15px;
      background: var(--note);
      color: #533f04;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--ok);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.55;
    }

    .status.warn { color: var(--warn); }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .jumpBox {
      margin-top: 14px;
      padding: 13px;
      border-radius: 15px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .jumpRow {
      display: grid;
      grid-template-columns: 1fr 104px;
      gap: 10px;
    }

    .linkTools {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .linkList {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .productLink {
      display: block;
      padding: 15px;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(16, 43, 92, .08);
    }

    .productLink strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
    }

    .productLink span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 16px;
      border-radius: 15px;
      background: var(--soft);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (min-width: 560px) {
      .modeGrid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 380px) {
      .page { padding-left: 10px; padding-right: 10px; }
      .hero, .panel { border-radius: 17px; padding: 15px; }
      .stats, .row, .jumpRow { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      h2 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <section id="homeView" class="hero">
        <div class="brand">
          <div class="logo">M</div>
          <div>
            <h1>Mark 的个人小工具</h1>
          </div>
        </div>
        <div class="modeGrid">
          <button class="modeBtn" type="button" data-view="dailyView">日常发布<span>复制日常文案</span></button>
          <button class="modeBtn" type="button" data-view="cartView">挂车发布<span>按商品选择文案并复制</span></button>
          <button class="modeBtn" type="button" data-view="linkView">挂车链接<span>搜索并打开商品页面</span></button>
        </div>
      </section>

      <section id="dailyView" class="panel">
        <div class="topbar">
          <button class="backBtn" type="button" data-view="homeView">返回</button>
          <h2>日常发布</h2>
        </div>
        <button id="dailyRefreshBtn" class="secondary" type="button">刷新数据</button>
        <div class="stats">
          <div class="stat"><span>总文案</span><strong id="dailyTotal">0</strong></div>
          <div class="stat"><span>当前</span><strong id="dailyCurrent">0</strong></div>
          <div class="stat"><span>进度</span><strong id="dailyProgress">0/0</strong></div>
        </div>
        <button id="dailyCopyBtn" class="primary" type="button">复制下一条</button>
        <div class="row">
          <button id="dailyPrevBtn" class="secondary" type="button">上一条</button>
          <button id="dailyResetBtn" class="secondary" type="button">重置</button>
        </div>
        <div class="jumpBox">
          <span class="fieldLabel">跳转到指定编号</span>
          <div class="jumpRow">
            <input id="dailyJumpInput" type="number" inputmode="numeric" min="1" placeholder="输入编号">
            <button id="dailyJumpBtn" class="secondary" type="button">跳转</button>
          </div>
        </div>
        <div id="dailyResult" class="result">
          <span class="fieldLabel">当前文案</span>
          <textarea id="dailyCopyText" readonly></textarea>
          <span class="fieldLabel">中文注释</span>
          <div id="dailyCnNote" class="note"></div>
          <div id="dailyMeta" class="meta"></div>
        </div>
        <div id="dailyStatus" class="status" role="status" aria-live="polite"></div>
      </section>

      <section id="cartView" class="panel">
        <div class="topbar">
          <button class="backBtn" type="button" data-view="homeView">返回</button>
          <h2>挂车发布</h2>
        </div>
        <button id="cartRefreshBtn" class="secondary" type="button">刷新数据</button>
        <label class="fieldLabel" for="cartProductSelect">请选择商品</label>
        <select id="cartProductSelect"></select>
        <div class="stats">
          <div class="stat"><span>商品文案</span><strong id="cartTotal">0</strong></div>
          <div class="stat"><span>当前</span><strong id="cartCurrent">0</strong></div>
          <div class="stat"><span>进度</span><strong id="cartProgress">0/0</strong></div>
        </div>
        <button id="cartCopyBtn" class="primary" type="button">复制下一条</button>
        <div class="row">
          <button id="cartPrevBtn" class="secondary" type="button">上一条</button>
          <button id="cartResetBtn" class="secondary" type="button">重置</button>
        </div>
        <div id="cartResult" class="result">
          <span class="fieldLabel">当前文案</span>
          <textarea id="cartCopyText" readonly></textarea>
          <span class="fieldLabel">中文注释</span>
          <div id="cartCnNote" class="note"></div>
          <div id="cartMeta" class="meta"></div>
        </div>
        <div id="cartStatus" class="status" role="status" aria-live="polite"></div>
      </section>

      <section id="linkView" class="panel">
        <div class="topbar">
          <button class="backBtn" type="button" data-view="homeView">返回</button>
          <h2>挂车链接</h2>
        </div>
        <div class="linkTools">
          <button id="linkRefreshBtn" class="primary" type="button">刷新挂车链接</button>
          <input id="linkSearchInput" type="search" placeholder="搜索商品名">
        </div>
        <div class="stats">
          <div class="stat"><span>全部商品</span><strong id="linkTotal">0</strong></div>
          <div class="stat"><span>搜索结果</span><strong id="linkVisible">0</strong></div>
          <div class="stat"><span>跳转方式</span><strong>直达</strong></div>
        </div>
        <div id="linkList" class="linkList"></div>
        <div id="linkStatus" class="status" role="status" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script>
    const DAILY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=2005332137&single=true&output=csv";
    const CART_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=512170271&single=true&output=csv";
    const LINK_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpepqJp8ZsCDVhDBQXaAeRxyf3XMatTImkj19AtvUTWw0EixwKehe-fV3waJzmNfTV_qKHCACJtBSk/pub?gid=1889161542&single=true&output=csv";
    const PRODUCT_URL_PREFIX = "https://shop.tiktok.com/view/product/";
    const STORAGE_PREFIX = "mark_tools_google_sheet_v1_";

    const state = {
      daily: { items: [], index: 0, loading: false },
      cart: { items: [], indexByProduct: {}, currentProduct: "", loading: false },
      links: { items: [], loading: false }
    };

    const els = {};

    document.addEventListener("DOMContentLoaded", () => {
      cacheElements();
      bindEvents();
      hydrateState();
      showView("homeView");
      loadDaily(false);
      loadCart(false);
      loadLinks(false);
    });

    function cacheElements() {
      [
        "homeView", "dailyView", "cartView", "linkView",
        "dailyRefreshBtn", "dailyCopyBtn", "dailyPrevBtn", "dailyResetBtn", "dailyJumpInput", "dailyJumpBtn",
        "dailyTotal", "dailyCurrent", "dailyProgress", "dailyCopyText", "dailyCnNote", "dailyMeta", "dailyStatus",
        "cartRefreshBtn", "cartProductSelect", "cartCopyBtn", "cartPrevBtn", "cartResetBtn",
        "cartTotal", "cartCurrent", "cartProgress", "cartCopyText", "cartCnNote", "cartMeta", "cartStatus",
        "linkRefreshBtn", "linkSearchInput", "linkTotal", "linkVisible", "linkList", "linkStatus"
      ].forEach((id) => { els[id] = document.getElementById(id); });
    }

    function bindEvents() {
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => showView(button.dataset.view));
      });

      els.dailyRefreshBtn.addEventListener("click", () => loadDaily(true));
      els.dailyCopyBtn.addEventListener("click", copyDailyNext);
      els.dailyPrevBtn.addEventListener("click", () => moveDaily(-1));
      els.dailyResetBtn.addEventListener("click", resetDaily);
      els.dailyJumpBtn.addEventListener("click", jumpDaily);
      els.dailyJumpInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") jumpDaily();
      });

      els.cartRefreshBtn.addEventListener("click", () => loadCart(true));
      els.cartProductSelect.addEventListener("change", () => {
        state.cart.currentProduct = els.cartProductSelect.value;
        save("cart_product", state.cart.currentProduct);
        renderCart();
      });
      els.cartCopyBtn.addEventListener("click", copyCartNext);
      els.cartPrevBtn.addEventListener("click", () => moveCart(-1));
      els.cartResetBtn.addEventListener("click", resetCart);

      els.linkRefreshBtn.addEventListener("click", () => loadLinks(true));
      els.linkSearchInput.addEventListener("input", renderLinks);
    }

    function hydrateState() {
      state.daily.index = readNumber("daily_index", 0);
      state.cart.indexByProduct = readJson("cart_index_by_product", {});
      state.cart.currentProduct = readText("cart_product", "");
    }

    function showView(viewId) {
      ["homeView", "dailyView", "cartView", "linkView"].forEach((id) => {
        if (id === "homeView") {
          els[id].style.display = id === viewId ? "block" : "none";
        } else {
          els[id].classList.toggle("active", id === viewId);
        }
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadDaily(forceRefresh) {
      state.daily.loading = true;
      renderDaily();
      setStatus(els.dailyStatus, forceRefresh ? "正在刷新日常发布..." : "正在读取日常发布...", false, 0);

      try {
        state.daily.items = parseCaptionCsv(await fetchCsv(DAILY_CSV_URL, forceRefresh), false);
        if (state.daily.index >= state.daily.items.length) state.daily.index = Math.max(state.daily.items.length - 1, 0);
        save("daily_index", state.daily.index);
        setStatus(els.dailyStatus, "已读取 " + state.daily.items.length + " 条日常文案。");
      } catch (error) {
        state.daily.items = [];
        state.daily.index = 0;
        setStatus(els.dailyStatus, "日常发布读取失败，请检查 Google 表格发布链接。", true, 0);
      } finally {
        state.daily.loading = false;
        renderDaily();
      }
    }

    async function loadCart(forceRefresh) {
      state.cart.loading = true;
      renderCart();
      setStatus(els.cartStatus, forceRefresh ? "正在刷新挂车发布..." : "正在读取挂车发布...", false, 0);

      try {
        state.cart.items = parseCaptionCsv(await fetchCsv(CART_CSV_URL, forceRefresh), true);
        initCartProducts();
        setStatus(els.cartStatus, "已读取 " + state.cart.items.length + " 条挂车文案。");
      } catch (error) {
        state.cart.items = [];
        setStatus(els.cartStatus, "挂车发布读取失败，请检查 Google 表格发布链接。", true, 0);
      } finally {
        state.cart.loading = false;
        renderCart();
      }
    }

    async function loadLinks(forceRefresh) {
      state.links.loading = true;
      renderLinks();
      setStatus(els.linkStatus, forceRefresh ? "正在刷新挂车链接..." : "正在读取挂车链接...", false, 0);

      try {
        state.links.items = parseLinkCsv(await fetchCsv(LINK_CSV_URL, forceRefresh));
        setStatus(els.linkStatus, "已读取 " + state.links.items.length + " 个商品链接。");
      } catch (error) {
        state.links.items = [];
        setStatus(els.linkStatus, "挂车链接读取失败，请检查 Google 表格发布链接。", true, 0);
      } finally {
        state.links.loading = false;
        renderLinks();
      }
    }

    async function fetchCsv(url, forceRefresh) {
      const finalUrl = forceRefresh ? url + (url.includes("?") ? "&" : "?") + "t=" + Date.now() : url;
      const response = await fetch(finalUrl, { cache: "no-store" });
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.text();
    }

    function parseCaptionCsv(csvText, hasProductName) {
      const rows = parseCsv(csvText);
      if (!rows.length) return [];

      const headers = rows[0].map((cell) => cleanCell(cell));
      const idIndex = findHeader(headers, ["排序编号", "编号"]);
      const productIndex = findHeader(headers, ["商品名称", "商品名"]);
      const copyIndex = findHeader(headers, ["可复制文案"]);
      const noteIndex = findHeader(headers, ["中文注释"]);
      const languageIndex = findHeader(headers, ["语言"]);
      if (copyIndex === -1 || noteIndex === -1) throw new Error("CSV 缺少必要字段");

      return rows.slice(1).reduce((result, row, rowIndex) => {
        const copyText = cleanCell(row[copyIndex]);
        if (isEmptyRow(row) || !copyText) return result;
        result.push({
          id: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
          productName: hasProductName && productIndex >= 0 ? cleanCell(row[productIndex]) : "",
          copyText,
          cnNote: cleanCell(row[noteIndex]),
          language: languageIndex >= 0 ? cleanCell(row[languageIndex]) : ""
        });
        return result;
      }, []);
    }

    function parseLinkCsv(csvText) {
      const rows = parseCsv(csvText);
      if (!rows.length) return [];

      const headers = rows[0].map((cell) => cleanCell(cell).toUpperCase());
      const idIndex = headers.indexOf("编号");
      const nameIndex = headers.indexOf("商品名");
      const pidIndex = headers.indexOf("PID");
      if (nameIndex === -1 || pidIndex === -1) throw new Error("CSV 缺少必要字段");

      return rows.slice(1).reduce((result, row, rowIndex) => {
        const productName = cleanCell(row[nameIndex]);
        const pid = cleanPid(row[pidIndex]);
        if (isEmptyRow(row) || !productName || !pid) return result;
        result.push({
          index: idIndex >= 0 ? cleanCell(row[idIndex]) || String(rowIndex + 1) : String(rowIndex + 1),
          productName,
          pid,
          url: PRODUCT_URL_PREFIX + pid
        });
        return result;
      }, []);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      row.push(cell);
      rows.push(row);
      return rows.filter((currentRow) => currentRow.some((cellValue) => cleanCell(cellValue) !== ""));
    }

    function initCartProducts() {
      const products = Array.from(new Set(state.cart.items.map((item) => item.productName).filter(Boolean)));
      els.cartProductSelect.innerHTML = products.map((name) => {
        return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
      }).join("");

      if (!products.includes(state.cart.currentProduct)) {
        state.cart.currentProduct = products[0] || "";
        save("cart_product", state.cart.currentProduct);
      }
      els.cartProductSelect.value = state.cart.currentProduct;
    }

    function renderDaily() {
      const total = state.daily.items.length;
      const item = state.daily.items[state.daily.index];
      const visible = total ? state.daily.index + 1 : 0;
      els.dailyTotal.textContent = total;
      els.dailyCurrent.textContent = visible;
      els.dailyProgress.textContent = visible + "/" + total;
      els.dailyJumpInput.max = Math.max(total, 1);

      if (state.daily.loading) {
        els.dailyCopyText.value = "正在读取表格数据...";
        els.dailyCnNote.textContent = "正在读取表格数据...";
        els.dailyMeta.textContent = "";
      } else if (item) {
        els.dailyCopyText.value = item.copyText;
        els.dailyCnNote.textContent = item.cnNote || "无中文注释";
        els.dailyMeta.innerHTML = [
          "编号：" + escapeHtml(item.id),
          "语言：" + escapeHtml(item.language || "-")
        ].join("<br>");
      } else {
        els.dailyCopyText.value = "";
        els.dailyCnNote.textContent = "没有可用文案。";
        els.dailyMeta.textContent = "";
      }

      const disabled = state.daily.loading || total === 0;
      els.dailyCopyBtn.disabled = disabled;
      els.dailyPrevBtn.disabled = disabled || state.daily.index <= 0;
      els.dailyResetBtn.disabled = disabled || state.daily.index === 0;
      els.dailyJumpBtn.disabled = disabled;
      els.dailyRefreshBtn.disabled = state.daily.loading;
    }

    function renderCart() {
      const rows = getCurrentCartRows();
      const total = rows.length;
      const index = getCartIndex();
      const item = rows[index];
      const visible = total ? index + 1 : 0;
      els.cartTotal.textContent = total;
      els.cartCurrent.textContent = visible;
      els.cartProgress.textContent = visible + "/" + total;

      if (state.cart.loading) {
        els.cartCopyText.value = "正在读取表格数据...";
        els.cartCnNote.textContent = "正在读取表格数据...";
        els.cartMeta.textContent = "";
      } else if (item) {
        els.cartCopyText.value = item.copyText;
        els.cartCnNote.textContent = item.cnNote || "无中文注释";
        els.cartMeta.innerHTML = [
          "商品名称：" + escapeHtml(item.productName || "-"),
          "编号：" + escapeHtml(item.id),
          "语言：" + escapeHtml(item.language || "-")
        ].join("<br>");
      } else {
        els.cartCopyText.value = "";
        els.cartCnNote.textContent = state.cart.currentProduct ? "当前商品没有可用文案。" : "请先选择商品。";
        els.cartMeta.textContent = "";
      }

      const disabled = state.cart.loading || total === 0;
      els.cartCopyBtn.disabled = disabled;
      els.cartPrevBtn.disabled = disabled || index <= 0;
      els.cartResetBtn.disabled = disabled || index === 0;
      els.cartRefreshBtn.disabled = state.cart.loading;
    }

    function renderLinks() {
      const keyword = normalizeText(els.linkSearchInput.value).toLowerCase();
      const filtered = state.links.items.filter((item) => !keyword || item.productName.toLowerCase().includes(keyword));
      els.linkTotal.textContent = state.links.items.length;
      els.linkVisible.textContent = filtered.length;
      els.linkRefreshBtn.disabled = state.links.loading;

      if (state.links.loading) {
        els.linkList.innerHTML = '<div class="empty">正在读取挂车链接...</div>';
        return;
      }

      if (!filtered.length) {
        els.linkList.innerHTML = '<div class="empty">没有找到匹配商品，请换个关键词搜索。</div>';
        return;
      }

      els.linkList.innerHTML = filtered.map((item) => {
        return '<a class="productLink" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' +
          '<strong>' + escapeHtml(item.index) + '. ' + escapeHtml(item.productName) + '</strong>' +
          '<span>' + escapeHtml(item.url) + '</span>' +
          '</a>';
      }).join("");
    }

    async function copyDailyNext() {
      const item = state.daily.items[state.daily.index];
      if (!item) return;
      const copiedIndex = state.daily.index + 1;
      const ok = await copyText(item.copyText);
      if (state.daily.index < state.daily.items.length - 1) {
        state.daily.index += 1;
        save("daily_index", state.daily.index);
      }
      renderDaily();
      setStatus(els.dailyStatus, ok ? "已复制第 " + copiedIndex + " 条。" : "自动复制失败，请长按文案框手动复制。", !ok);
    }

    async function copyCartNext() {
      const rows = getCurrentCartRows();
      const index = getCartIndex();
      const item = rows[index];
      if (!item) return;
      const copiedIndex = index + 1;
      const ok = await copyText(item.copyText);
      if (index < rows.length - 1) {
        setCartIndex(index + 1);
      }
      renderCart();
      setStatus(els.cartStatus, ok ? "已复制第 " + copiedIndex + " 条。" : "自动复制失败，请长按文案框手动复制。", !ok);
    }

    function moveDaily(delta) {
      state.daily.index = clamp(state.daily.index + delta, 0, Math.max(state.daily.items.length - 1, 0));
      save("daily_index", state.daily.index);
      renderDaily();
    }

    function resetDaily() {
      state.daily.index = 0;
      save("daily_index", state.daily.index);
      renderDaily();
      setStatus(els.dailyStatus, "已重置到第 1 条。");
    }

    function jumpDaily() {
      const target = cleanCell(els.dailyJumpInput.value);
      if (!target) {
        setStatus(els.dailyStatus, "请输入要跳转的编号。", true);
        return;
      }
      const foundIndex = state.daily.items.findIndex((item) => item.id === target);
      if (foundIndex === -1) {
        setStatus(els.dailyStatus, "没有找到编号 " + target + "。", true);
        return;
      }
      state.daily.index = foundIndex;
      save("daily_index", state.daily.index);
      renderDaily();
      setStatus(els.dailyStatus, "已跳转到编号 " + target + "。");
    }

    function moveCart(delta) {
      setCartIndex(clamp(getCartIndex() + delta, 0, Math.max(getCurrentCartRows().length - 1, 0)));
      renderCart();
    }

    function resetCart() {
      setCartIndex(0);
      renderCart();
      setStatus(els.cartStatus, "已重置到第 1 条。");
    }

    function getCurrentCartRows() {
      return state.cart.items.filter((item) => item.productName === state.cart.currentProduct);
    }

    function getCartIndex() {
      const total = getCurrentCartRows().length;
      const index = state.cart.indexByProduct[state.cart.currentProduct] || 0;
      return clamp(index, 0, Math.max(total - 1, 0));
    }

    function setCartIndex(index) {
      state.cart.indexByProduct[state.cart.currentProduct] = index;
      save("cart_index_by_product", state.cart.indexByProduct);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {}
      }
      return fallbackCopy(text);
    }

    function fallbackCopy(text) {
      try {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "-1000px";
        textarea.style.left = "-1000px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(textarea);
        return ok;
      } catch (error) {
        return false;
      }
    }

    function setStatus(element, text, warning, duration) {
      element.textContent = text || "";
      element.className = warning ? "status warn" : "status";
      clearTimeout(element.__timer);
      if (text && duration !== 0) {
        element.__timer = setTimeout(() => {
          element.textContent = "";
          element.className = "status";
        }, duration || 1800);
      }
    }

    function findHeader(headers, names) {
      return headers.findIndex((header) => names.includes(header));
    }

    function cleanCell(value) {
      return String(value || "").trim();
    }

    function cleanPid(value) {
      return cleanCell(value).replace(/\D/g, "");
    }

    function isEmptyRow(row) {
      return row.every((cell) => cleanCell(cell) === "");
    }

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function save(key, value) {
      localStorage.setItem(STORAGE_PREFIX + key, typeof value === "string" ? value : JSON.stringify(value));
    }

    function readText(key, fallback) {
      return localStorage.getItem(STORAGE_PREFIX + key) || fallback;
    }

    function readNumber(key, fallback) {
      const value = parseInt(localStorage.getItem(STORAGE_PREFIX + key) || "", 10);
      return Number.isFinite(value) ? value : fallback;
    }

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_PREFIX + key) || "") || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function escapeHtml(value) {
      return normalizeText(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
